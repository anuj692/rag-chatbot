services:
  - type: web
    name: rag-chatbot
    env: python
    plan: free
    branch: main
    buildCommand: bash render_build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
